services:
  api:
    # Run as the invoking host user (not root) so bind-mounted files stay
    # host-owned and a compromised payload can't act as root over the mounts
    # (sc-4285 / F-INFRA-10). Defaults to 1000:1000; override via SCENEWORKS_UID /
    # SCENEWORKS_GID (the rust-api Docker smoke + dev docs set these).
    user: "${SCENEWORKS_UID:-1000}:${SCENEWORKS_GID:-1000}"
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/rust.Dockerfile
      target: rust-api
      args:
        BIN: sceneworks-rust-api
    environment:
      SCENEWORKS_API_HOST: ${SCENEWORKS_API_HOST:-0.0.0.0}
      SCENEWORKS_API_PORT: ${SCENEWORKS_API_PORT:-8010}
      SCENEWORKS_DATA_DIR: /sceneworks/data
      SCENEWORKS_CONFIG_DIR: /sceneworks/config
      SCENEWORKS_JOBS_DB_PATH: /sceneworks/data/cache/jobs.db
      SCENEWORKS_ACCESS_TOKEN: ${SCENEWORKS_ACCESS_TOKEN:-}
      SCENEWORKS_ALLOW_OPEN_BIND: ${SCENEWORKS_ALLOW_OPEN_BIND:-}
      SCENEWORKS_CORS_ORIGINS: ${SCENEWORKS_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176}
      SCENEWORKS_DISABLE_MODEL_SIZE_ESTIMATE: ${SCENEWORKS_DISABLE_MODEL_SIZE_ESTIMATE:-1}
      # Off-Mac candle cutover (epic 5483 Phase 7 / sc-5502 + sc-5503): the Python torch
      # worker is retired in Docker, so require the candle GPU worker and fail anything it
      # can't serve LOUDLY (the claim-time sweeps) instead of waiting for a torch worker
      # that no longer exists. Set REQUIRED=0 to fall back to a co-resident torch worker.
      SCENEWORKS_CANDLE_REQUIRED: ${SCENEWORKS_CANDLE_REQUIRED:-1}
      SCENEWORKS_CANDLE_UNSUPPORTED_MODE: ${SCENEWORKS_CANDLE_UNSUPPORTED_MODE:-enforce}
      HF_HOME: ${SCENEWORKS_HF_HOME:-/sceneworks/data/cache/huggingface}
      HF_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
    ports:
      - "${SCENEWORKS_API_PUBLISH_HOST:-127.0.0.1}:${SCENEWORKS_API_PORT:-8010}:${SCENEWORKS_API_PORT:-8010}"
    volumes:
      - ${SCENEWORKS_DATA_BIND:-./data}:/sceneworks/data
      - ${SCENEWORKS_HF_CACHE_BIND:-${USERPROFILE:-$HOME}/.cache/huggingface}:/sceneworks/data/cache/huggingface
      - ${SCENEWORKS_CONFIG_BIND:-./config}:/sceneworks/config
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$${SCENEWORKS_API_PORT:-8010}/api/v1/health\" >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    # Candle GPU inference worker (CUDA; compute_80 PTX → sm_120). The off-Mac torch
    # replacement (epic 5483 Phase 7 / sc-5503): Docker GPU inference runs natively on
    # candle, retiring the Python torch worker + its image. Built from rust.Dockerfile's
    # rust-worker-candle target. The candle build advertises its providers by default
    # (#804 — backend_candle_enabled defaults on for a candle build), so no runtime
    # toggle is needed; the API's SCENEWORKS_CANDLE_REQUIRED makes anything candle can't
    # serve fail loudly rather than wait for a torch worker that no longer exists.
    # Run as the invoking host user, not root (sc-4285 / F-INFRA-10).
    user: "${SCENEWORKS_UID:-1000}:${SCENEWORKS_GID:-1000}"
    build:
      context: .
      dockerfile: docker/rust.Dockerfile
      target: rust-worker-candle
    restart: unless-stopped
    environment:
      SCENEWORKS_API_URL: http://api:${SCENEWORKS_API_PORT:-8010}
      SCENEWORKS_DATA_DIR: /sceneworks/data
      SCENEWORKS_CONFIG_DIR: /sceneworks/config
      SCENEWORKS_WORKER_ID: candle-inference-worker-0
      # Real CUDA device index (not the macOS `mlx` sentinel). `auto` picks the first
      # visible GPU; override to pin a device (e.g. on a multi-GPU host).
      SCENEWORKS_GPU_ID: ${SCENEWORKS_CANDLE_GPU_ID:-auto}
      SCENEWORKS_ACCESS_TOKEN: ${SCENEWORKS_ACCESS_TOKEN:-}
      # Download credentials (same contract as rust-worker): `credentials.json` from the
      # mounted config volume, with HF_TOKEN / SCENEWORKS_CREDENTIALS as host overrides.
      HF_TOKEN: ${HF_TOKEN:-}
      SCENEWORKS_CREDENTIALS: ${SCENEWORKS_CREDENTIALS:-}
      HF_HOME: ${SCENEWORKS_HF_HOME:-/sceneworks/data/cache/huggingface}
      HF_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
      # "Refine my prompt" (sc-2041 / sc-5500) runs in-process on the candle TextLlm
      # provider and downloads on demand. Optionally override the default model repo.
      PROMPT_REFINE_MODEL: ${PROMPT_REFINE_MODEL:-}
      PROMPT_REFINE_MAX_NEW_TOKENS: ${PROMPT_REFINE_MAX_NEW_TOKENS:-512}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - ${SCENEWORKS_DATA_BIND:-./data}:/sceneworks/data
      - ${SCENEWORKS_HF_CACHE_BIND:-${USERPROFILE:-$HOME}/.cache/huggingface}:/sceneworks/data/cache/huggingface
      - ${SCENEWORKS_CONFIG_BIND:-./config}:/sceneworks/config
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  rust-worker:
    # Run as the invoking host user, not root (sc-4285 / F-INFRA-10).
    user: "${SCENEWORKS_UID:-1000}:${SCENEWORKS_GID:-1000}"
    build:
      context: .
      dockerfile: docker/rust.Dockerfile
      target: rust-worker
      args:
        BIN: sceneworks-rust-worker
    restart: unless-stopped
    environment:
      SCENEWORKS_API_URL: http://api:${SCENEWORKS_API_PORT:-8010}
      SCENEWORKS_DATA_DIR: /sceneworks/data
      SCENEWORKS_CONFIG_DIR: /sceneworks/config
      SCENEWORKS_WORKER_ID: rust-utility-worker-0
      SCENEWORKS_GPU_ID: ${SCENEWORKS_RUST_WORKER_GPU_ID:-cpu}
      # Utility jobs (downloads, imports, frame extract, exports) are I/O-bound and
      # serialize per worker. Run a small pool so a quick upload isn't stuck behind
      # a long download. Only applies in dedicated cpu mode.
      SCENEWORKS_UTILITY_WORKERS: ${SCENEWORKS_UTILITY_WORKERS:-4}
      SCENEWORKS_ACCESS_TOKEN: ${SCENEWORKS_ACCESS_TOKEN:-}
      # Download credentials. The rust-worker reads `credentials.json` (written by
      # the API's Settings -> Service credentials screen) from the mounted config
      # volume below. HF_TOKEN and SCENEWORKS_CREDENTIALS are optional overrides
      # for headless deployments and win per host over that file.
      HF_TOKEN: ${HF_TOKEN:-}
      SCENEWORKS_CREDENTIALS: ${SCENEWORKS_CREDENTIALS:-}
      HF_HOME: ${SCENEWORKS_HF_HOME:-/sceneworks/data/cache/huggingface}
      HF_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
      HUGGINGFACE_HUB_CACHE: ${SCENEWORKS_HUGGINGFACE_HUB_CACHE:-/sceneworks/data/cache/huggingface/hub}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - ${SCENEWORKS_DATA_BIND:-./data}:/sceneworks/data
      - ${SCENEWORKS_HF_CACHE_BIND:-${USERPROFILE:-$HOME}/.cache/huggingface}:/sceneworks/data/cache/huggingface
      - ${SCENEWORKS_CONFIG_BIND:-./config}:/sceneworks/config
    depends_on:
      api:
        condition: service_healthy
    # Keep GPU visibility available for explicit Rust GPU auto mode.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:${SCENEWORKS_API_PORT:-8010}
    ports:
      - "${SCENEWORKS_WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
