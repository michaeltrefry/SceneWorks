[package]
name = "sceneworks-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
futures-util = "0.3"
glob = "0.3"
# PNG encoding for generated image assets (epic 3018, sc-3020). png-only keeps the
# dependency small and cross-platform (the image-job pipeline + its tests run on every
# platform; only real MLX inference is macOS-gated).
# png to encode generated assets (sc-3020); jpeg/webp to decode reference/source
# images for the FLUX.2 edit path (sc-3029) — uploads aren't only PNG.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
# CPU raster for DWPose skeleton rendering (epic 3018, sc-3028): filled polygons
# (rotated-ellipse limbs), circles (joints/points), for the Z-Image strict-pose
# ControlNet. Pure-Rust + cross-platform (the renderer + its tests run everywhere;
# only the MLX control generation is macOS-gated). Pinned to the image 0.25 line.
imageproc = { version = "0.25", default-features = false }
nix = { version = "0.29", default-features = false, features = ["process", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sceneworks-core = { path = "../sceneworks-core" }
# Backend-neutral contract layer (package `sceneworks-gen-core`, lib `gen_core`): tensor-free
# (thiserror/inventory/tokenizers/safetensors), so it links on ALL targets — used directly by the
# registry-derived capability advertisement + the all-targets stub test (sc-3723, epic 3720 Phase 0).
# Kept in the all-targets section (NOT the macOS block below) precisely so the derivation + stub test
# compile on the Linux/Windows lanes, where no provider crate is linked and the registry is empty.
# The rev MUST stay identical to the `mlx-gen` pin in the macOS block: two gen-core revs would mean
# two distinct `inventory` registries (one for the worker's derivation, one the provider crates
# register into) and the runtime would see "engine not found". Bump both together.
sceneworks-gen-core = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "ef69edf74d8a269bf98139a8119e073a7a782022" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.13"
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
uuid = { version = "1.11", features = ["v4"] }

[dev-dependencies]
axum = "0.7"
tower = { version = "0.5", features = ["util"] }
# Only the all-targets registry-derivation test stub (engines.rs) calls `inventory::submit!`;
# the production code reaches the registry through `gen_core::registry::*`. Must be the SAME
# inventory version gen_core's `collect!` uses (0.3.x) so the stub registers into the registry
# the derivation reads.
inventory = "0.3"

# Native MLX image+video inference engine (epic 2337), linked in-process so the
# Rust GPU worker dispatches generation with no Python adapter/sidecar (epic 3018).
# macOS-only: mlx-gen builds Apple MLX from source and is meaningless off Apple
# Silicon. Git-pinned by SHA (the repo + its pmetal-mlx-rs fork are public, so this
# resolves on Linux/Windows CI without creds and only *compiles* on macOS via the
# target gate). The deployment-target build seam lives in /.cargo/config.toml.
#
# Local mlx-gen co-dev: point this at a sibling checkout via a workspace-root
# [patch] (NOT committed — a path that is absent on CI breaks resolution):
#   [patch."https://github.com/michaeltrefry/mlx-gen"]
#   mlx-gen = { path = "../mlx-gen" }
# `mlx-gen` is the core engine (load/registry/request types). Each model family
# lives in its own provider crate that self-registers into the engine's link-time
# `inventory` registry — the core does NOT depend on the providers, so a consumer
# links the provider crates it serves and references each with `use … as _;`
# (image_jobs.rs) to keep the linker from dropping the registration. Per-family
# stories (sc-3022..3035) add their provider here; this scaffold links Z-Image
# (sc-3022, next) to prove the cross-crate registry path end to end.

[features]
# Off by default. Opt-in build flag for the candle (Windows/CUDA) generative backend (epic 3672,
# sc-3675): pulls the optional `candle-gen-sdxl` provider (built with its `cuda` feature). Kept OUT
# of the default set so the Desktop (Windows) installer build (desktop-windows.yml, windows-latest,
# no CUDA toolkit) and every non-CUDA build resolve WITHOUT candle / cudarc / nvcc. The dedicated
# candle Windows CI lane (sc-3676) builds with `--features backend-candle`. Linking the crate does
# NOT enable it at runtime — that is the separate `backend_candle_enabled` setting, read by
# `engines::registry_capabilities`. Two-level gating: build feature + runtime setting.
# sc-5096 (epic 5095) widens the lane beyond SDXL: the four candle image generators
# (z-image, flux, flux2, qwen-image) are pulled in here too (each with its `cuda` feature) so the
# Windows/CUDA worker links + force-links their `inventory::submit!` registrations. Their engine ids
# (`z_image_turbo` / `flux1_schnell` / `flux1_dev` / `flux2_klein_9b` / `qwen_image`) already have
# `MODEL_TABLE` rows, so `engines::registry_capabilities` advertises them with no further change.
# sc-5097 (epic 5095) adds the two candle VIDEO providers (wan, ltx) behind the same feature, wired
# through the new worker candle-video dispatch (`GenerationOutput::Video`). ltx registers the engine id
# `ltx_2_3_distilled` (not the MLX `ltx_2_3`); it needs the Gemma-3-12B encoder snapshot via
# `LTX_GEMMA_DIR` (resolved by the worker).
backend-candle = [
    "dep:candle-gen-sdxl",
    "dep:candle-gen-z-image",
    "dep:candle-gen-flux",
    "dep:candle-gen-flux2",
    "dep:candle-gen-qwen-image",
    "dep:candle-gen-wan",
    "dep:candle-gen-ltx",
    # sc-5098 (epic 5095): the candle JoyCaption captioner (image->text), wired into the worker's
    # caption job path via the neutral `gen_core::load_captioner` seam.
    "dep:candle-gen-joycaption",
]

[target.'cfg(target_os = "macos")'.dependencies]
# DWPose whole-body pose detection in Rust (epic 3482, sc-3487): RTMW (yolox_m +
# rtmw-dw-x-l) via onnxruntime with the CoreML execution provider, replacing the
# Python rtmlib `pose_detect` path so the Pose Library "create from photo" flow +
# InstantID pose conditioning keep working on a Python-free Mac. macOS-only (the
# Python rtmlib path stays the Win/Linux backend); `download-binaries` pulls a
# prebuilt onnxruntime that includes the CoreML EP. `zip` unpacks the openmmlab
# weight bundles on first use (download-on-first-use parity with rtmlib). The spike
# (docs/sc-3487/spike-findings.md) validated sub-pixel keypoint parity + matched
# latency vs the shipped detector.
# `load-dynamic` so the onnxruntime dylib is dlopen'd at runtime from
# `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like SCENEWORKS_FFMPEG) — this is
# robust under app-bundle relocation, unlike build-time linking + rpath.
# `download-binaries` still fetches a CoreML-enabled onnxruntime at build time so the
# desktop packager (build-sidecar.mjs) has a dylib to stage and dev runs work.
ort = { version = "=2.0.0-rc.12", features = ["coreml", "load-dynamic", "download-binaries"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
# Rev ef69edf (mlx-gen branch `claude/sc-4816-seedvr2-softness`, PR #422, epic 4811 / sc-4816): the
# SceneWorks `video_upscale` cutover. Branches off mlx-gen main `9b5ddce` (PR #421, sc-4814 — the
# `mlx-gen-seedvr2` SeedVR2 upscaler engine: 3D causal VAE + spatiotemporal-window MMDiT + image AND
# video one-step super-resolution) and adds ONE delta: `softness: Option<f32>` on the backend-neutral
# `GenerationRequest` (gen-core), read by `mlx-gen-seedvr2`'s generator (was a hardcoded `0.0`) so the
# `video_upscale` job can expose a real input-softness control. `None`/0.0 = the reference default →
# non-breaking for every other model. ⚠️ TEMPORARY branch pin: re-point to the squash-merge commit of
# PR #422 once Michael merges it. gen-core is otherwise byte-identical to `e9c569c` (seedvr2 added a
# new family crate only), so the default `check-gen-core-skew.sh` gate stays green (one rev). mlx-rs
# stays `44929a0` (unchanged by #421/#422) — the direct `mlx-rs` pin below stays in lockstep. The
# Windows `backend-candle` lane needs a matching candle-gen gen-core re-pin (tracked follow-up).
# Rev e9c569c (mlx-gen main, merged PR #415, epic 3164 / sc-5148): adds the native-MLX Lens
# LoRA/LoKr TRAINING kernel (`mlx-gen-lens/src/training.rs`, `LensTrainer` registered under `lens`),
# unblocking the worker `lens_lora` training cutover (sc-5180 — the training sibling of sc-5105's
# inference cutover). The delta vs `4db50b2` is ONLY `mlx-gen-lens/src/training.rs` (one new module);
# it touches no mlx-rs/engine ABI, so the worker just gains `load_trainer("lens")`. ⚠️ mlx-rs stays
# `44929a0` (unchanged by #415) — the direct `mlx-rs` pin below MUST stay in lockstep, so MLX rebuilds
# nothing. On top of:
# Rev 95cd5c6 (mlx-gen main, merged PR #403, epic 3090 / sc-5012): adds the combined
# Kolors ControlNet-pose + IP-Adapter + img2img pass (`Kolors::denoise_controlnet_ip_latents` /
# `generate_controlnet_ip` + the relaxed registry validate guard), unblocking the Kolors strict-pose
# worker cutover (sc-4766). Sits directly on top of `6c0f904` (the worker's prior pin from sc-5009 /
# SceneWorks #629, mlx-gen #401 — the recoverable Metal command-buffer error fix that bumped the
# mlx-rs fork pin to 44929a0); #403 is the only mlx-gen commit added vs 6c0f904, and it touches no
# mlx-rs/engine ABI, so the worker just gains the kolors combined pass. Bundles the earlier main
# merges since 8355152 too (#398 SAM3 video PCS, #400 SAM3 geometry/exemplar encoder, #401, #402 SAM3
# quant+API) — none touched by the worker's image path. ⚠️ mlx-rs is 44929a0 (introduced by 6c0f904 /
# sc-5009, not changed by #403); the direct `mlx-rs` pin below MUST stay in lockstep with mlx-gen
# main's internal pin or the worker links two incompatible `Array`/`Error` types.
# On top of:
# Rev 8355152 (mlx-gen, PR #385, epic 3720 / sc-4906): adds `backend: &'static str` to
# TrainerDescriptor/CaptionerDescriptor/TransformDescriptor (mirroring `ModelDescriptor.backend`),
# letting the worker gate training/caption capability advertisement per-backend (engines.rs
# `registry_capabilities`) instead of on "any enabled backend". All existing descriptors are
# `backend: "mlx"`, so macOS advertisement is unchanged. The delta vs ea08d47 is ONLY the
# descriptor field — no engine/mlx-rs change (mlx-rs pin was b6e4e56), so MLX rebuilds nothing.
# On top of:
# Rev ea08d47 (mlx-gen main HEAD, merged PR #384, epic 3720 / sc-4481; bundles #382 sc-4874 +
# #383 sc-4886/4887): the z-image LoRA OOM training fix PLUS the typed-cancellation contract.
# Training fix (#382+#383): #382 adds the opt-in `TrainingConfig.gradient_checkpointing` field +
# a pre-flight OOM guard; #383 adds always-on attention-segment checkpointing (no wiring) AND the
# `train_dtype` field (engine default "bf16") — bf16 forward is THE lever that drops the 1024²
# first-step peak 135 → ~44 GB, so the run survives without the checkbox. The pin won't compile
# until `map_training_config` sets both `gradient_checkpointing` (advanced `gradientCheckpointing`)
# and `train_dtype` (advanced `mixedPrecision`, default "bf16") — see training_jobs.rs (sc-4881).
# The mlx-rs fork pin moved e59ffd88 → b6e4e56 in #383 (the checkpointing primitive lives partly
# in the fork — mlx-rs PR #8); the direct `mlx-rs` pin below tracks it in lockstep or the worker
# links two incompatible `Exception`/`Error` types. #384 (sc-4481) adds a typed `mlx_gen::Error::
# Canceled` that round-trips 1:1 with `gen_core::Error::Canceled` (previously stringified to Msg);
# this is purely additive and TRANSPARENT to the worker, which detects cancellation via
# `CancelFlag::is_cancelled()` guards (not by matching the error variant) and already constructs
# `gen_core::Error::Canceled` itself (generator_cache.rs). mlx-rs pin unchanged at ea08d47, so MLX
# rebuilds nothing vs #383. Chosen over the surgical #383 (`394031d`) to stay on main HEAD.
# Rev 810a9ff (mlx-gen main, merged PR #381, epic 3720 / sc-3722): the sampler-policy + weights-
# metadata split. The schedule/coefficient math (per-step affine `StepCoeffs`, the FlowMatch/LCM/TCD/
# Lightning policies, the `AlphaSchedule`/sigma builders) and the safetensors header/byte-view reader
# (`CheckpointMeta`) + LoRA/LoKr/LoHa/kohya string parsing move into `sceneworks-gen-core`; mlx-gen
# keeps only the tensor `apply_step` and re-exports every sampler type + `mlx_gen::adapters::loader`
# helper at the old paths. NO public mlx-gen signature changed (the worker import surface, Appendix C,
# is identical) and the byte-parity rule keeps flow-match/FLUX golden output bit-for-bit unchanged, so
# this bump has ZERO worker source diff — only the rev + lock. One behavior change exists upstream but
# is not worker-visible: stochastic accel samplers (LCM/TCD η>0, SDXL-only) now draw seeded per-step
# re-noise (D6). New transitive build dep `safetensors` enters gen-core's subgraph (serde-only, no
# tensor lib). The mlx-rs pin is unchanged (e59ffd88) so MLX core rebuilds nothing. On top of:
# Rev f0aa634 (mlx-gen main, merged PR #380, epic 3720 / sc-3721): Phase-0 of the backend-neutral
# gen-core extraction. Adds a new workspace member `sceneworks-gen-core` (lib `gen_core`, zero tensor
# deps) holding the Generator/Trainer/Captioner/Transform contracts, request/output/registry types,
# the inventory registry, host-vec tokenizer output, and the pure schedule/imageops policy math;
# mlx-gen + every family crate now consume it and RE-EXPORT it at the old `mlx_gen::…` paths, so the
# worker's import surface (Appendix C of the epic guide) is unchanged. `ModelDescriptor` gains
# `backend:"mlx"` + `Capabilities.supported_quants` (read by the sc-3723 advertisement, not yet). The
# only worker-visible behavior change is Error DISPLAY STRINGS: the neutral `gen_core::Error` renders
# device failures as "backend op failed: …", capability gaps as "unsupported: …", and cancellation as
# "cancelled" (any error-string test assertions update accordingly). No sampler/coefficient math moved
# (that is sc-3722) so golden-image output is byte-unchanged. New transitive dep
# `sceneworks-gen-core` enters the graph; the mlx-rs pin is unchanged (e59ffd88) so MLX core rebuilds
# nothing. On top of:
# Rev 8b2746e (mlx-gen main, merged PR #379): exposes the SAM2 reverse-tracking entry point
# `Sam2VideoPredictor::propagate_reverse` (sc-4750, verified reverse video propagation), plus a
# repo cleanup/maintenance sweep (F-160..F-178: rename `mean_count_gt`->`count_gt`, drop the
