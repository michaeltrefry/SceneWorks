name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci --prefix apps/web
      - name: Lint web sources
        run: npm --prefix apps/web run lint
      - name: Run web test suite
        run: npm --prefix apps/web run test
      - name: Build web production bundle
        run: npm --prefix apps/web run build

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install contract test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==9.0.2 httpx==0.28.1 "pillow>=12.0.0,<13" "numpy>=2.0,<3" "opencv-python-headless>=4.10,<5"
      - name: Run worker test suite
        # Marker expression instead of a hardcoded file list so new test files
        # are picked up automatically; e2e/parity-marked tests run in their own
        # later steps against the built Rust API (sc-4180).
        run: python -m pytest -q tests/ -m "not e2e and not parity" --strict-markers
      - name: Run scaffold and compose checks
        run: |
          npm run check
          npm run check:compose
      - name: Run Rust workspace checks
        run: npm run rust:check
      - name: Build Rust API before contract tests
        run: cargo build -q -p sceneworks-rust-api
      - name: Run end-to-end job pipeline test
        run: python -m pytest -q -m e2e --strict-markers
      - name: Run Rust API contract snapshot tests
        run: python -m pytest -q -m parity --strict-markers
      - name: Smoke default Rust API Docker runtime
        run: npm run check:docker:rust-api
