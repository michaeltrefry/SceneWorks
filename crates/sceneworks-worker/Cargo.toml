[package]
name = "sceneworks-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
futures-util = "0.3"
glob = "0.3"
# PNG encoding for generated image assets (epic 3018, sc-3020). png-only keeps the
# dependency small and cross-platform (the image-job pipeline + its tests run on every
# platform; only real MLX inference is macOS-gated).
# png to encode generated assets (sc-3020); jpeg/webp to decode reference/source
# images for the FLUX.2 edit path (sc-3029) — uploads aren't only PNG.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
# CPU raster for DWPose skeleton rendering (epic 3018, sc-3028): filled polygons
# (rotated-ellipse limbs), circles (joints/points), for the Z-Image strict-pose
# ControlNet. Pure-Rust + cross-platform (the renderer + its tests run everywhere;
# only the MLX control generation is macOS-gated). Pinned to the image 0.25 line.
imageproc = { version = "0.25", default-features = false }
nix = { version = "0.29", default-features = false, features = ["process", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sceneworks-core = { path = "../sceneworks-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.13"
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
uuid = { version = "1.11", features = ["v4"] }

[dev-dependencies]
axum = "0.7"
tower = { version = "0.5", features = ["util"] }

# Native MLX image+video inference engine (epic 2337), linked in-process so the
# Rust GPU worker dispatches generation with no Python adapter/sidecar (epic 3018).
# macOS-only: mlx-gen builds Apple MLX from source and is meaningless off Apple
# Silicon. Git-pinned by SHA (the repo + its pmetal-mlx-rs fork are public, so this
# resolves on Linux/Windows CI without creds and only *compiles* on macOS via the
# target gate). The deployment-target build seam lives in /.cargo/config.toml.
#
# Local mlx-gen co-dev: point this at a sibling checkout via a workspace-root
# [patch] (NOT committed — a path that is absent on CI breaks resolution):
#   [patch."https://github.com/michaeltrefry/mlx-gen"]
#   mlx-gen = { path = "../mlx-gen" }
# `mlx-gen` is the core engine (load/registry/request types). Each model family
# lives in its own provider crate that self-registers into the engine's link-time
# `inventory` registry — the core does NOT depend on the providers, so a consumer
# links the provider crates it serves and references each with `use … as _;`
# (image_jobs.rs) to keep the linker from dropping the registration. Per-family
# stories (sc-3022..3035) add their provider here; this scaffold links Z-Image
# (sc-3022, next) to prove the cross-crate registry path end to end.
[target.'cfg(target_os = "macos")'.dependencies]
# DWPose whole-body pose detection in Rust (epic 3482, sc-3487): RTMW (yolox_m +
# rtmw-dw-x-l) via onnxruntime with the CoreML execution provider, replacing the
# Python rtmlib `pose_detect` path so the Pose Library "create from photo" flow +
# InstantID pose conditioning keep working on a Python-free Mac. macOS-only (the
# Python rtmlib path stays the Win/Linux backend); `download-binaries` pulls a
# prebuilt onnxruntime that includes the CoreML EP. `zip` unpacks the openmmlab
# weight bundles on first use (download-on-first-use parity with rtmlib). The spike
# (docs/sc-3487/spike-findings.md) validated sub-pixel keypoint parity + matched
# latency vs the shipped detector.
# `load-dynamic` so the onnxruntime dylib is dlopen'd at runtime from
# `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like SCENEWORKS_FFMPEG) — this is
# robust under app-bundle relocation, unlike build-time linking + rpath.
# `download-binaries` still fetches a CoreML-enabled onnxruntime at build time so the
# desktop packager (build-sidecar.mjs) has a dylib to stage and dev runs work.
ort = { version = "=2.0.0-rc.12", features = ["coreml", "load-dynamic", "download-binaries"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
# Rev 0ed3019 (mlx-gen main): adds the native-MLX SAM2 segmenter crate `mlx-gen-sam2`
# (epic 3704, mlx-gen #176/#177/#179 — Hiera encoder + FPN neck + prompt encoder +
# two-way mask decoder + box→mask segmenter), consumed by the Rust person-track
# segmenter (sc-3709). On top of the prior rev's third-party LyCORIS (epic 3641,
# #171/#172/#174), the core AdaptableHost loader (flux/flux2/qwen-image/z-image) plus
# the SDXL merge path, the Wan in-place merge, the LTX forward residual, Qwen-Image
# ControlNet strict pose (epic 3401), LoRA/LoKr trainer surface (epic 3039), Wan/LTX
# converter stack, Wan-VACE provider + per-request control_scale (epic 3040), JoyCaption
# captioner (epic 3550), and the XLabs FLUX IP-Adapter (epic 3621). One shared rev so
# MLX builds once with the unchanged mlx-rs pin (e59ffd88, identical across the bump ->
# no MLX rebuild).
mlx-gen = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# `mlx-rs` (pmetal-mlx-rs fork) — used directly by the native MLX YOLO11 person
# detector (person_jobs.rs, sc-3633) for the ops the shared `mlx_gen::nn` layer does
# not cover: CSP channel splits, depthwise convs, SPPF max-pool, the C2PSA attention,
# and the DFL/anchor decode. Pinned to the SAME rev mlx-gen uses so MLX builds once
# (a different rev would compile pmetal-mlx-sys twice). Also exercised by the NAX
# guard test (tests/nax_guard.rs).
mlx-rs = { package = "pmetal-mlx-rs", git = "https://github.com/michaeltrefry/mlx-rs", rev = "e59ffd88014340e6a49b26de95446b8b76a57932" }
mlx-gen-z-image = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# FLUX.1 schnell/dev provider (epic 3018, sc-3023). Same git rev as mlx-gen so MLX
# builds once; self-registers `flux1_schnell`/`flux1_dev` via inventory only when
# linked + referenced (`use mlx_gen_flux as _;` in image_jobs.rs).
mlx-gen-flux = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# Qwen-Image provider (epic 3018, sc-3024). Self-registers `qwen_image`.
mlx-gen-qwen-image = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# FLUX.2-klein provider (epic 3018, sc-3025). Self-registers `flux2_klein_9b`
# (txt2img) + `flux2_klein_9b_edit` + `flux2_klein_9b_kv_edit` (edit = sc-3029).
mlx-gen-flux2 = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# SDXL provider (epic 3018, sc-3026). Self-registers `sdxl` (also serves the
# `realvisxl` finetune — same arch). Replaces the in-process _vendor/mlx_sd path.
mlx-gen-sdxl = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# Wan2.2 video provider (epic 3018, sc-3034). Self-registers `wan2_2_ti2v_5b`
# (dense T2V/TI2V), `wan2_2_t2v_14b` + `wan2_2_i2v_14b` (dual-expert MoE) via
# inventory when linked + referenced (`use mlx_gen_wan as _;` in video_jobs.rs).
mlx-gen-wan = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# LTX-2.3 video provider (epic 3018, sc-3035). Self-registers `ltx_2_3` (T2V/I2V +
# synchronized audio, 2-stage distilled). Linked + referenced (`use mlx_gen_ltx as _;`
# in video_jobs.rs); the Gemma-3 text encoder is resolved by the engine (HF cache / env).
# Same rev as the other mlx-gen crates (sc-3060 bump) so MLX + the shared core build once.
mlx-gen-ltx = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# JoyCaption image-to-text provider (epic 3550, sc-3556). Self-registers
# `fancyfeast/llama-joycaption-beta-one-hf-llava` into mlx-gen's captioner
# registry for native dataset captioning on the macOS MLX worker.
mlx-gen-joycaption = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }
# SAM2 (Segment Anything 2) segmenter (epic 3704, sc-3705..3709). A plain utility
# crate (NOT a self-registering generation provider) — `person_segment.rs` builds a
# `Sam2Segmenter` directly from the converted MLX weights to produce per-frame person
# masks in `run_person_track`. Same git rev + mlx-rs pin as the other mlx-gen crates so
# MLX builds once.
mlx-gen-sam2 = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "0ed301962c9ec6e055b1cfeff2c75c7448006887" }

[lints]
workspace = true
