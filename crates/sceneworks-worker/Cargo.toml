[package]
name = "sceneworks-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
futures-util = "0.3"
glob = "0.3"
# PNG encoding for generated image assets (epic 3018, sc-3020). png-only keeps the
# dependency small and cross-platform (the image-job pipeline + its tests run on every
# platform; only real MLX inference is macOS-gated).
# png to encode generated assets (sc-3020); jpeg/webp to decode reference/source
# images for the FLUX.2 edit path (sc-3029) — uploads aren't only PNG.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
# CPU raster for DWPose skeleton rendering (epic 3018, sc-3028): filled polygons
# (rotated-ellipse limbs), circles (joints/points), for the Z-Image strict-pose
# ControlNet. Pure-Rust + cross-platform (the renderer + its tests run everywhere;
# only the MLX control generation is macOS-gated). Pinned to the image 0.25 line.
imageproc = { version = "0.25", default-features = false }
nix = { version = "0.29", default-features = false, features = ["process", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sceneworks-core = { path = "../sceneworks-core" }
# Backend-neutral contract layer (package `sceneworks-gen-core`, lib `gen_core`): tensor-free
# (thiserror/inventory/tokenizers/safetensors), so it links on ALL targets — used directly by the
# registry-derived capability advertisement + the all-targets stub test (sc-3723, epic 3720 Phase 0).
# Kept in the all-targets section (NOT the macOS block below) precisely so the derivation + stub test
# compile on the Linux/Windows lanes, where no provider crate is linked and the registry is empty.
# The rev MUST stay identical to the `mlx-gen` pin in the macOS block: two gen-core revs would mean
# two distinct `inventory` registries (one for the worker's derivation, one the provider crates
# register into) and the runtime would see "engine not found". Bump both together.
# Rev fa0f75b (mlx-gen main, sc-5551): bumps every mlx-gen crate db08076 -> fa0f75b to pick up the
# per-step cancel-flag check in Wan/LTX video *generation* (#456/sc-5551) — the video sibling of the
# image per-step cancel — so a mid-clip video cancel interrupts within ~a step (the worker-side
# defer-terminal fix sc-5516 / #662 is already merged; this pin makes its video path responsive).
# gen-core delta over the range is EMPTY (the range touched only the wan/ltx + scail2 provider crates,
# not gen-core), so the worker's import surface is unchanged → skew gate stays green at one rev.
# Rev d3ec5e5 (mlx-gen main, sc-5552): bumps every mlx-gen crate fa0f75b -> d3ec5e5 to pick up the new
# additive `mlx-gen-prompt-refine` crate (the native MLX `prompt_refine` TextLlm; mlx-gen #457). gen-core
# + gen-core-testkit are BYTE-IDENTICAL fa0f75b -> d3ec5e5 (the merge only ADDS a provider crate), so
# the worker's import surface is unchanged → skew gate stays green at one rev. The candle-gen pin in the
# macOS block is re-pinned in LOCKSTEP to candle-gen d3ec5e5 (#57, carried by sc-5501's dbe5560 bump) so
# the `--features backend-candle` lane resolves the same single gen-core rev. mlx-rs unchanged (44929a0).
# Rev 44db818 (mlx-gen branch claude/sc-5637-training-samples, sc-5637): adds training PREVIEW SAMPLES.
# gen-core `TrainingConfig` gains `sample_every`/`sample_prompts`/`sample_steps`/`sample_guidance_scale`
# (default sample_every:0 ⇒ off) and `TrainingProgress` gains an additive `Sample { step, index, total,
# prompt, image }` variant; ALL SIX native trainers (z-image/sdxl/kolors/lens image + wan/ltx video)
# render previews from the in-progress adapter at the configured cadence (video families emit one still
# frame). The worker maps the new config fields + persists each `Sample` as a PNG project asset
# (training_jobs.rs). PURELY ADDITIVE to gen-core (new fields + new enum variant), so the worker import
# surface is otherwise unchanged → skew gate stays green at one rev. mlx-rs unchanged (44929a0);
# candle-gen unaffected (gen-core change is additive; the backend-candle lane still resolves the same
# single gen-core rev). NB: bumps EVERY mlx-gen crate d3ec5e5 -> 44db818 in lockstep.
sceneworks-gen-core = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "44db8184106d70be88cd8661f018d4371ac9c0cf" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.13"
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
uuid = { version = "1.11", features = ["v4"] }

[dev-dependencies]
axum = "0.7"
tower = { version = "0.5", features = ["util"] }
# Only the all-targets registry-derivation test stub (engines.rs) calls `inventory::submit!`;
# the production code reaches the registry through `gen_core::registry::*`. Must be the SAME
# inventory version gen_core's `collect!` uses (0.3.x) so the stub registers into the registry
# the derivation reads.
inventory = "0.3"

# Native MLX image+video inference engine (epic 2337), linked in-process so the
# Rust GPU worker dispatches generation with no Python adapter/sidecar (epic 3018).
# macOS-only: mlx-gen builds Apple MLX from source and is meaningless off Apple
# Silicon. Git-pinned by SHA (the repo + its pmetal-mlx-rs fork are public, so this
# resolves on Linux/Windows CI without creds and only *compiles* on macOS via the
# target gate). The deployment-target build seam lives in /.cargo/config.toml.
#
# Local mlx-gen co-dev: point this at a sibling checkout via a workspace-root
# [patch] (NOT committed — a path that is absent on CI breaks resolution):
#   [patch."https://github.com/michaeltrefry/mlx-gen"]
#   mlx-gen = { path = "../mlx-gen" }
# `mlx-gen` is the core engine (load/registry/request types). Each model family
# lives in its own provider crate that self-registers into the engine's link-time
# `inventory` registry — the core does NOT depend on the providers, so a consumer
# links the provider crates it serves and references each with `use … as _;`
# (image_jobs.rs) to keep the linker from dropping the registration. Per-family
# stories (sc-3022..3035) add their provider here; this scaffold links Z-Image
# (sc-3022, next) to prove the cross-crate registry path end to end.

[features]
# Off by default. Opt-in build flag for the candle (Windows/CUDA) generative backend (epic 3672,
# sc-3675): pulls the optional `candle-gen-sdxl` provider (built with its `cuda` feature). Kept OUT
# of the default set so the Desktop (Windows) installer build (desktop-windows.yml, windows-latest,
# no CUDA toolkit) and every non-CUDA build resolve WITHOUT candle / cudarc / nvcc. The dedicated
# candle Windows CI lane (sc-3676) builds with `--features backend-candle`. Linking the crate does
# NOT enable it at runtime — that is the separate `backend_candle_enabled` setting, read by
# `engines::registry_capabilities`. Two-level gating: build feature + runtime setting.
# sc-5096 (epic 5095) widens the lane beyond SDXL: the four candle image generators
# (z-image, flux, flux2, qwen-image) are pulled in here too (each with its `cuda` feature) so the
# Windows/CUDA worker links + force-links their `inventory::submit!` registrations. Their engine ids
# (`z_image_turbo` / `flux1_schnell` / `flux1_dev` / `flux2_klein_9b` / `qwen_image`) already have
# `MODEL_TABLE` rows, so `engines::registry_capabilities` advertises them with no further change.
# sc-5097 (epic 5095) adds the two candle VIDEO providers (wan, ltx) behind the same feature, wired
# through the new worker candle-video dispatch (`GenerationOutput::Video`). ltx registers the engine id
# `ltx_2_3_distilled` (not the MLX `ltx_2_3`); it needs the Gemma-3-12B encoder snapshot via
# `LTX_GEMMA_DIR` (resolved by the worker).
backend-candle = [
    "dep:candle-gen-sdxl",
    "dep:candle-gen-z-image",
    "dep:candle-gen-flux",
    "dep:candle-gen-flux2",
    "dep:candle-gen-qwen-image",
    # sc-5484 (epic 3692): the candle Chroma image provider (chroma1_hd / chroma1_base / chroma1_flash).
    "dep:candle-gen-chroma",
    # sc-5576 (epic 3692): the candle Kolors image provider (`kolors` — SDXL UNet + ChatGLM3-6B
    # encoder) and the candle SenseNova-U1 NEO-Unify image provider (`sensenova_u1_8b` +
    # `sensenova_u1_8b_fast`). Both pure T2I; their `MODEL_TABLE` rows already exist (MLX families), so
    # `engines::registry_capabilities` advertises them off-Mac with no further change.
    "dep:candle-gen-kolors",
    "dep:candle-gen-sensenova",
    # sc-5501 (epic 5164): candle-gen core, so the worker can build the understanding-path input
    # tensors that drive `candle_gen_sensenova::T2iModel::{vqa, interleave_gen}` off the registry.
    "dep:candle-gen",
    # sc-5126 (epic 5107): the candle Lens / Lens-Turbo image provider — gpt-oss-20b MoE encoder +
    # 48-layer MMDiT + Flux.2 VAE. The first candle family with Q4/Q8 quant + LoRA/LoKr; pure T2I.
    "dep:candle-gen-lens",
    "dep:candle-gen-wan",
    "dep:candle-gen-ltx",
    # sc-5098 (epic 5095): the candle JoyCaption captioner (image->text), wired into the worker's
    # caption job path via the neutral `gen_core::load_captioner` seam.
    "dep:candle-gen-joycaption",
    # sc-5525 (epic 5095): the candle prompt-refine LLM (Llama-3.2-3B-Instruct), wired into the
    # worker's prompt_refine job via the neutral `gen_core::load_textllm` seam (sc-5500 contract).
    "dep:candle-gen-prompt-refine",
]

[target.'cfg(target_os = "macos")'.dependencies]
# DWPose whole-body pose detection in Rust (epic 3482, sc-3487): RTMW (yolox_m +
# rtmw-dw-x-l) via onnxruntime with the CoreML execution provider, replacing the
# Python rtmlib `pose_detect` path so the Pose Library "create from photo" flow +
# InstantID pose conditioning keep working on a Python-free Mac. macOS-only (the
# Python rtmlib path stays the Win/Linux backend); `download-binaries` pulls a
# prebuilt onnxruntime that includes the CoreML EP. `zip` unpacks the openmmlab
# weight bundles on first use (download-on-first-use parity with rtmlib). The spike
# (docs/sc-3487/spike-findings.md) validated sub-pixel keypoint parity + matched
# latency vs the shipped detector.
# `load-dynamic` so the onnxruntime dylib is dlopen'd at runtime from
# `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like SCENEWORKS_FFMPEG) — this is
# robust under app-bundle relocation, unlike build-time linking + rpath.
# `download-binaries` still fetches a CoreML-enabled onnxruntime at build time so the
# desktop packager (build-sidecar.mjs) has a dylib to stage and dev runs work.
ort = { version = "=2.0.0-rc.12", features = ["coreml", "load-dynamic", "download-binaries"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
# Rev fa0f75b (mlx-gen main, merged PRs #453/#454/#455 + #456, epic 5439 / sc-5448): adds the full
# **SCAIL-2** provider (`mlx-gen-scail2`, dep below) — a Wan2.1-14B I2V end-to-end character-animation /
# cross-identity-replacement Generator self-registering as `scail2_14b` (reference character image +
# driving video + auto-generated color-coded masks → animated/identity-replaced video; packed-token
# conditioning + per-source RoPE + open-CLIP ViT-H/14 image cross-attn; reuses mlx-gen-wan's VAE/UMT5/
# scheduler and depends on mlx-gen-wan internally). The new request conditioning the worker builds —
# `Conditioning::Mask` (the reference's color mask) paired with `Reference`, plus the driving
# `ControlClip{frames, mask}` — landed in gen-core at this rev (the descriptor advertises
# `ConditioningKind::Mask`). Also bundles sc-5551 (#456): honor the cancel flag per-step in Wan/LTX
# video denoise (output-neutral; the worker's existing cancel path just gets finer-grained). ⚠️ mlx-rs
# stays `44929a0` (mlx-gen HEAD's internal mlx-rs rev is unchanged at this pin), so the direct `mlx-rs`
# pin below is unchanged and MLX rebuilds only the new `mlx-gen-scail2` crate (+ its mlx-gen-wan dep).
# `sceneworks-gen-core` is bumped in lockstep (the macOS block + the direct dep at line 33) so the skew
# gate stays green (ONE rev). This bump moves EVERY mlx-gen crate rev to fa0f75b. The candle-gen pin
# (`c032f16`) is NOT touched: candle deps are `optional` (off in the default `cargo tree --target all`
# skew graph), so candle catches up to fa0f75b's gen-core separately in its own repo — exactly as the
# 41c95a1 bernini bump below left candle at c032f16 and kept main green. On top of:
# Rev 41c95a1 (mlx-gen main, merged PR #433, epic 4699 / sc-4707): adds the full **Bernini** provider
# (`mlx-gen-bernini`, dep below) — a Qwen2.5-VL-7B semantic planner + Wan2.2-T2V-A14B dual-expert
# renderer self-registering as `bernini`. The delta vs `1a97909` (which already carried the bernini
# connector #420/#426) is the full Generator + planner MAR loop + ViT-guidance (sc-5145 #428),
# Q4/Q8 (sc-5146), and the streaming dual-expert quant load (sc-5360 #433). ⚠️ mlx-rs stays `44929a0`
# (no engine/ABI change), so the direct `mlx-rs` pin below is unchanged and MLX rebuilds only the new
# `mlx-gen-bernini` crate (+ its mlx-gen-wan dep). gen-core delta vs `1a97909` = 11 additive lines in
# `weightsmeta.rs` — the worker's gen-core import surface is unchanged and `check-gen-core-skew.sh`
# stays green (one rev). NB: this bump moves EVERY mlx-gen crate rev in lockstep (skew gate). On top of:
# Rev 1a97909 (mlx-gen main, merged PR #422, epic 4811 / sc-4816 + sc-4815): adds an optional
# `softness: Option<f32>` to gen-core `GenerationRequest` (the SeedVR2 `--softness` pre-blur) read by
# the `mlx-gen-seedvr2` registry, so the new `mlx-gen-seedvr2` dep below runs the SeedVR2 upscaler for
# BOTH the image path (sc-4815, via the worker's memory-bounded `with_cached_generator` seam) and the
# net-new `video_upscale` job (sc-4816, via `video_jobs::run_video_upscale_job`). (sc-4815's own
# duplicate softness PR #423 was closed in favor of the already-merged #422 — parallel video-upscale +
# image-upscale sessions both needed the same gen-core field.) Bundles the entire SeedVR2 engine
# merged since `e9c569c`: seedvr2 image #416/#419 + video #421 + #422 softness + the #425 (sc-5224) DiT
# perf hoist + engine-side 7B (sc-5197) / Q4-Q8 (sc-5198), plus the bernini connector #420/#426 — none
# of which the worker wires yet (it loads `seedvr2_3b` fp16, quant None). ⚠️ mlx-rs stays `44929a0`
# (none of #416–#426 touch the mlx-rs/engine ABI), so the direct `mlx-rs` pin below is unchanged and
# MLX rebuilds only the new `mlx-gen-seedvr2` crate. gen-core is byte-identical to `e9c569c` EXCEPT the
# additive `softness` field, so the default `check-gen-core-skew.sh` gate stays green (one rev); the
# Windows `backend-candle` lane's matching candle-gen gen-core re-pin to this rev landed in sc-5228
# (candle-gen PR #33 — see the candle-gen dep block below), so that lane also resolves a single rev.
# On top of:
# Rev e9c569c (mlx-gen main, merged PR #415, epic 3164 / sc-5148): adds the native-MLX Lens
# LoRA/LoKr TRAINING kernel (`mlx-gen-lens/src/training.rs`, `LensTrainer` registered under `lens`),
# unblocking the worker `lens_lora` training cutover (sc-5180 — the training sibling of sc-5105's
# inference cutover). The delta vs `4db50b2` is ONLY `mlx-gen-lens/src/training.rs` (one new module);
# it touches no mlx-rs/engine ABI, so the worker just gains `load_trainer("lens")`. ⚠️ mlx-rs stays
# `44929a0` (unchanged by #415) — the direct `mlx-rs` pin below MUST stay in lockstep, so MLX rebuilds
# nothing. On top of:
# Rev 95cd5c6 (mlx-gen main, merged PR #403, epic 3090 / sc-5012): adds the combined
# Kolors ControlNet-pose + IP-Adapter + img2img pass (`Kolors::denoise_controlnet_ip_latents` /
