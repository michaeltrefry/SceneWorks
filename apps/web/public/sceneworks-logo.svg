<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="SceneWorks">
  <title>SceneWorks</title>
  <style>
    .ground { fill: #0f1622; }
    .seam { stroke: #fbfaf6; }
    @media (prefers-color-scheme: dark) {
      .ground { fill: #b9babb; }
      .seam { stroke: #0f1622; }
    }
  </style>
  <defs>
    <clipPath id="sw-cut">
      <rect x="10" y="10" width="80" height="80" rx="14"></rect>
    </clipPath>
  </defs>
  <g clip-path="url(#sw-cut)">
    <rect class="ground" x="10" y="10" width="80" height="80"></rect>
    <polygon points="10,10 90,10 90,90" fill="#2fa193"></polygon>
    <line class="seam" x1="10" y1="90" x2="90" y2="10" stroke-width="2.5" stroke-linecap="square"></line>
  </g>
</svg>
