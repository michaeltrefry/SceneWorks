[package]
name = "sceneworks-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
futures-util = "0.3"
glob = "0.3"
# PNG encoding for generated image assets (epic 3018, sc-3020). png-only keeps the
# dependency small and cross-platform (the image-job pipeline + its tests run on every
# platform; only real MLX inference is macOS-gated).
# png to encode generated assets (sc-3020); jpeg/webp to decode reference/source
# images for the FLUX.2 edit path (sc-3029) — uploads aren't only PNG.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
# CPU raster for DWPose skeleton rendering (epic 3018, sc-3028): filled polygons
# (rotated-ellipse limbs), circles (joints/points), for the Z-Image strict-pose
# ControlNet. Pure-Rust + cross-platform (the renderer + its tests run everywhere;
# only the MLX control generation is macOS-gated). Pinned to the image 0.25 line.
imageproc = { version = "0.25", default-features = false }
nix = { version = "0.29", default-features = false, features = ["process", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sceneworks-core = { path = "../sceneworks-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.13"
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
uuid = { version = "1.11", features = ["v4"] }

[dev-dependencies]
axum = "0.7"
tower = { version = "0.5", features = ["util"] }

# Native MLX image+video inference engine (epic 2337), linked in-process so the
# Rust GPU worker dispatches generation with no Python adapter/sidecar (epic 3018).
# macOS-only: mlx-gen builds Apple MLX from source and is meaningless off Apple
# Silicon. Git-pinned by SHA (the repo + its pmetal-mlx-rs fork are public, so this
# resolves on Linux/Windows CI without creds and only *compiles* on macOS via the
# target gate). The deployment-target build seam lives in /.cargo/config.toml.
#
# Local mlx-gen co-dev: point this at a sibling checkout via a workspace-root
# [patch] (NOT committed — a path that is absent on CI breaks resolution):
#   [patch."https://github.com/michaeltrefry/mlx-gen"]
#   mlx-gen = { path = "../mlx-gen" }
# `mlx-gen` is the core engine (load/registry/request types). Each model family
# lives in its own provider crate that self-registers into the engine's link-time
# `inventory` registry — the core does NOT depend on the providers, so a consumer
# links the provider crates it serves and references each with `use … as _;`
# (image_jobs.rs) to keep the linker from dropping the registration. Per-family
# stories (sc-3022..3035) add their provider here; this scaffold links Z-Image
# (sc-3022, next) to prove the cross-crate registry path end to end.
[target.'cfg(target_os = "macos")'.dependencies]
# DWPose whole-body pose detection in Rust (epic 3482, sc-3487): RTMW (yolox_m +
# rtmw-dw-x-l) via onnxruntime with the CoreML execution provider, replacing the
# Python rtmlib `pose_detect` path so the Pose Library "create from photo" flow +
# InstantID pose conditioning keep working on a Python-free Mac. macOS-only (the
# Python rtmlib path stays the Win/Linux backend); `download-binaries` pulls a
# prebuilt onnxruntime that includes the CoreML EP. `zip` unpacks the openmmlab
# weight bundles on first use (download-on-first-use parity with rtmlib). The spike
# (docs/sc-3487/spike-findings.md) validated sub-pixel keypoint parity + matched
# latency vs the shipped detector.
# `load-dynamic` so the onnxruntime dylib is dlopen'd at runtime from
# `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like SCENEWORKS_FFMPEG) — this is
# robust under app-bundle relocation, unlike build-time linking + rpath.
# `download-binaries` still fetches a CoreML-enabled onnxruntime at build time so the
# desktop packager (build-sidecar.mjs) has a dylib to stage and dev runs work.
ort = { version = "=2.0.0-rc.12", features = ["coreml", "load-dynamic", "download-binaries"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
# Rev 94e688c (mlx-gen main, merged PR #368, epic 3090 / sc-4568 + sc-4733): the native-MLX Kolors
# LoRA/LoKr **trainer** (`mlx-gen-kolors/src/training.rs` — `KolorsTrainer` + `load_trainer` +
# `TrainerRegistration` under id `"kolors"`; SDXL-UNet trainer core with the ChatGLM3-6B encoder,
# Kolors `time_ids`, and the DDPM-over-`scaled_linear` noise schedule, `num_train_timesteps=1100`)
# plus the Kolors inference LoRA wiring (registry accepts `spec.adapters` → `apply_sdxl_adapters`).
# Consumed by the SceneWorks Kolors training cutover (sc-4732): `engine_trainer_id` maps
# `kolors_lora` → `"kolors"` and `training_jobs.rs` force-links `mlx-gen-kolors`. The mlx-rs pin is
# unchanged (e59ffd88) so MLX core rebuilds nothing. On top of:
# Rev b9b9aba (mlx-gen main, merged PR #200, epic 3180 / sc-3905): primes the empty `<think></think>`
# block in `T2iModel::vqa` (matching the reference `chat(think=False)` + the no-think interleave
# path) so the VQA answer isn't consumed by a chain-of-thought — required for the SceneWorks VQA
# cutover (sc-3905). On top of rev 72214e3 (merged PR #199, epic 3180): the native-MLX SenseNova-U1
# family crate `mlx-gen-sensenova` (NEO-Unify — a dense dual-path Qwen3-MoT AR LLM + flow-matching
# image generator + NEO ViT; sc-3181..sc-3194). Two registered ids: `sensenova_u1_8b` (base, 50 NFE
# / text-CFG 4 + image-CFG via true_cfg) and `sensenova_u1_8b_fast` (8-step distill-LoRA merged at
# load, CFG 1). Public `T2iModel::{vqa, interleave_gen}` serve the VQA + Document-Studio paths the
# `Generator` contract can't express (sc-3905). Q4/Q8 backbone quant (sc-3193). The mlx-rs pin is
# unchanged (e59ffd88) so MLX core rebuilds nothing.
# On top of rev ed8e6a1 (mlx-gen main, merged PR #193, epic 3109 / sc-3117+sc-3380): adds InstantID
# pose mode (MultiControlNet IdentityNet + xinsir OpenPose, `InstantId::with_openpose` +
# `generate_pose`, native skeleton rasterizer + no-face-visible branch) and the face-restore
# pass (`restore_face`, ADetailer-style crop→re-render→feathered paste-back, gender-neutral
# prompt), consumed by the SceneWorks InstantID pose/face-restore wiring (sc-3381).
# On top of rev a67e8ed (PR #189, epic 3531): the native-MLX Chroma family crate
# `mlx-gen-chroma` (chroma1_hd/base/flash — a FLUX.1-schnell-derived DiT + distilled-guidance
# Approximator, T5-only true-CFG conditioning, MMDiT attention masking; sc-3834..sc-3842), all
# three variants at real-weight e2e parity vs diffusers plus Q4/Q8 + LoRA/LoKr.
# On top of rev 0d17c72 (mlx-gen main, merged PRs #182 + #183): completes the native-MLX SAM2 video
# layer — the memory bank (memory encoder + memory attention, sc-3713 #182) and the
# `Sam2VideoPredictor` propagation predictor (init_state / propagate, sc-3714 #183), consumed
# by the Rust person-track segmenter's prompt-once + propagate path (sc-3715). On top of rev
# 13c0681 (PRs #180 + #181): the SVD motion knobs on `GenerationRequest`
# (`motion_bucket_id` / `noise_aug_strength` / `decode_chunk_size`, #180) AND the SVD
# motion-conditioning fps decouple via `conditioning_fps` (#181), read by the `svd_xt`
# provider for the SVD worker cutover (sc-3523 / sc-3764). And earlier:
# the native-MLX SAM2 segmenter crate `mlx-gen-sam2` (epic 3704,
# mlx-gen #176/#177/#179 — Hiera encoder + FPN neck + prompt encoder + two-way mask decoder
# + box→mask segmenter), consumed by the Rust person-track segmenter (sc-3709); third-party
# LyCORIS (epic 3641, #171/#172/#174); the core AdaptableHost loader
# (flux/flux2/qwen-image/z-image) plus the SDXL merge path, the Wan in-place merge, the LTX
# forward residual, Qwen-Image ControlNet strict pose (epic 3401), LoRA/LoKr trainer surface
# (epic 3039), Wan/LTX converter stack, Wan-VACE provider + per-request control_scale
# (epic 3040), JoyCaption captioner (epic 3550), and the XLabs FLUX IP-Adapter (epic 3621).
# One shared rev so MLX builds once with the unchanged mlx-rs pin (e59ffd88, identical across
# the bump -> no MLX rebuild).
mlx-gen = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# `mlx-rs` (pmetal-mlx-rs fork) — used directly by the native MLX YOLO11 person
# detector (person_jobs.rs, sc-3633) for the ops the shared `mlx_gen::nn` layer does
# not cover: CSP channel splits, depthwise convs, SPPF max-pool, the C2PSA attention,
# and the DFL/anchor decode. Pinned to the SAME rev mlx-gen uses so MLX builds once
# (a different rev would compile pmetal-mlx-sys twice). Also exercised by the NAX
# guard test (tests/nax_guard.rs).
mlx-rs = { package = "pmetal-mlx-rs", git = "https://github.com/michaeltrefry/mlx-rs", rev = "e59ffd88014340e6a49b26de95446b8b76a57932" }
mlx-gen-z-image = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# FLUX.1 schnell/dev provider (epic 3018, sc-3023). Same git rev as mlx-gen so MLX
# builds once; self-registers `flux1_schnell`/`flux1_dev` via inventory only when
# linked + referenced (`use mlx_gen_flux as _;` in image_jobs.rs).
mlx-gen-flux = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Qwen-Image provider (epic 3018, sc-3024). Self-registers `qwen_image`.
mlx-gen-qwen-image = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# FLUX.2-klein provider (epic 3018, sc-3025). Self-registers `flux2_klein_9b`
# (txt2img) + `flux2_klein_9b_edit` + `flux2_klein_9b_kv_edit` (edit = sc-3029).
mlx-gen-flux2 = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# SDXL provider (epic 3018, sc-3026). Self-registers `sdxl` (also serves the
# `realvisxl` finetune — same arch). Replaces the in-process _vendor/mlx_sd path.
mlx-gen-sdxl = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Chroma provider (epic 3531, sc-3843). Self-registers `chroma1_hd` / `chroma1_base` /
# `chroma1_flash` (FLUX.1-schnell-derived DiT, T5-only true-CFG conditioning) via inventory
# when linked + referenced (`use mlx_gen_chroma as _;` in image_jobs.rs). Same git rev as the
# other mlx-gen crates so MLX builds once.
mlx-gen-chroma = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# SenseNova-U1 provider (epic 3180, sc-3900 / sc-3905). Self-registers `sensenova_u1_8b` (base) +
# `sensenova_u1_8b_fast` (8-step distill) via inventory when linked + referenced
# (`use mlx_gen_sensenova as _;` in image_jobs.rs). Also exposes the public `SenseNova` / `T2iModel`
# types directly for the VQA + Document-Studio (interleave) paths the `Generator` contract can't
# express (sc-3905). Same git rev as the other mlx-gen crates so MLX builds once.
mlx-gen-sensenova = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Wan2.2 video provider (epic 3018, sc-3034). Self-registers `wan2_2_ti2v_5b`
# (dense T2V/TI2V), `wan2_2_t2v_14b` + `wan2_2_i2v_14b` (dual-expert MoE) via
# inventory when linked + referenced (`use mlx_gen_wan as _;` in video_jobs.rs).
mlx-gen-wan = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# LTX-2.3 video provider (epic 3018, sc-3035). Self-registers `ltx_2_3` (T2V/I2V +
# synchronized audio, 2-stage distilled). Linked + referenced (`use mlx_gen_ltx as _;`
# in video_jobs.rs); the Gemma-3 text encoder is resolved by the engine (HF cache / env).
# Same rev as the other mlx-gen crates (sc-3060 bump) so MLX + the shared core build once.
mlx-gen-ltx = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Stable Video Diffusion (SVD-XT) image→video provider (epic 3040, sc-3523). Self-registers
# `svd_xt` (fixed ~25-frame img2vid burst, no text prompt — animates one source image via the
# `motion_bucket_id`/`noise_aug_strength`/fps micro-conditioning) into the engine registry when
# linked + referenced (`use mlx_gen_svd as _;` in video_jobs.rs). Same git rev + mlx-rs pin as the
# other mlx-gen crates so MLX builds once.
mlx-gen-svd = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# JoyCaption image-to-text provider (epic 3550, sc-3556). Self-registers
# `fancyfeast/llama-joycaption-beta-one-hf-llava` into mlx-gen's captioner
# registry for native dataset captioning on the macOS MLX worker.
mlx-gen-joycaption = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# SAM2 (Segment Anything 2) segmenter (epic 3704, sc-3705..3709). A plain utility
# crate (NOT a self-registering generation provider) — `person_segment.rs` builds a
# `Sam2Segmenter` directly from the converted MLX weights to produce per-frame person
# masks in `run_person_track`. Same git rev + mlx-rs pin as the other mlx-gen crates so
# MLX builds once.
mlx-gen-sam2 = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Native MLX face-analysis stack (epic 3079) — SCRFD 5-pt detector + glintr100 ArcFace
# (iresnet100) 512-d embedder. A plain utility crate (NOT a self-registering generation
# provider) consumed by the InstantID provider below to detect the reference face + produce
# the ArcFace embedding with zero Python (replaces insightface/onnxruntime on the Mac path).
mlx-gen-face = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# InstantID identity-preserving SDXL provider (epic 3109 engine / sc-3345 integration). A
# bespoke API (`InstantId::load(InstantIdPaths{ sdxl_base, identitynet, ip_adapter })` →
# `.with_face`/`.with_openpose` → `generate`/`generate_angle`/`generate_pose`/`restore_face`),
# NOT an inventory-registered `Generator` — wired via a dedicated `generate_instantid_stream` in
# image_jobs.rs (parallel to the sc-3060 SDXL-advanced path), not the MLX_MODELS table. Composes
# mlx-gen-sdxl (UNet + IdentityNet ControlNet + IP-Adapter Resampler) with mlx-gen-face. The
# pinned rev (ed8e6a1) carries the base port (#153), the sc-3329 quant fix (#155), AND pose mode
# + face-restore (#193: with_openpose/generate_pose/restore_face — sc-3117/3380). Same mlx-rs pin.
mlx-gen-instantid = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }
# Kolors (Kwai-Kolors) provider crate (epic 3090). Registers the inference generator id `kolors`
# (sc-3874) AND — the piece this worker consumes today — the `KolorsTrainer` LoRA/LoKr trainer under
# the same id `kolors` (sc-4568), reached via `mlx_gen::load_trainer("kolors", spec)` for the Kolors
# training cutover (sc-4732). Self-registers via `inventory::submit!`, so `training_jobs.rs` must
# force-link the crate (`use mlx_gen_kolors as _;`) or the linker drops the `TrainerRegistration`.
# Same git rev + mlx-rs pin as the other mlx-gen crates so MLX builds once. (The inference-side
# routing cutover is sc-3875; this dep is added now for the trainer registration.)
mlx-gen-kolors = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "94e688c778385efe23f21cf7c6a8b748b23713d7" }

[lints]
workspace = true
