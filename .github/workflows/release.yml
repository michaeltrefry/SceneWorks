name: Release (desktop)

# Builds, signs, notarizes, staples, and publishes a DRAFT GitHub Release of the
# desktop app when a `v*` tag is pushed (or via manual dispatch). Two jobs attach to
# the SAME draft release:
#   macos   — signs + notarizes the .app via the APPLE_* env (from repo secrets),
#             then staple-dmg.mjs staples the DMG; CREATES the draft release.
#   windows — builds the candle/CUDA NSIS + MSI installers and UPLOADS them to the
#             release the macos job created (needs: macos). Mirrors the build steps in
#             desktop-windows.yml; keep the two in sync when either changes.
# Mirrors the local mac flow (`npm run release:mac`): `tauri build` signs + notarizes
# the .app, then staple-dmg.mjs staples the DMG.
#
# The macos job runs on the self-hosted `nax` runner — GitHub-hosted images can't
# build at the macOS 26.2 deployment target (see macos-mlx.yml). The Developer ID
# cert lives in that runner's login keychain, so `codesign` uses it directly and no
# base64 APPLE_CERTIFICATE import is needed. Required repo secrets:
#   APPLE_SIGNING_IDENTITY  "Developer ID Application: … (TEAMID)"
#   APPLE_API_ISSUER        App Store Connect API issuer UUID
#   APPLE_API_KEY           App Store Connect API key id
#   APPLE_API_KEY_PATH      path to the .p8 ON the runner (valid because the runner
#                           is the signing Mac; a cloud runner would instead store
#                           the .p8 contents as a secret and write it to a temp file)
#
# Tag/dispatch only — never push/PR. NOTE: `codesign` needs the login keychain
# unlocked in the runner's session; verify end-to-end with a throwaway tag (e.g.
# v0.0.0-rc.1) before relying on this. See sc-5930.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    # Self-hosted macOS 26.2 runner; same-repo only — never run fork code.
    if: ${{ github.repository == 'SceneWorks/SceneWorks' }}
    runs-on: [self-hosted, macOS, ARM64, nax]
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
      # Minisign keypair for the in-app auto-updater (sc-1355): signs the
      # `.app.tar.gz` updater payload so the shipped app can verify it against
      # plugins.updater.pubkey. Only needed when createUpdaterArtifacts is on (set
      # via --config below), so other CI lanes / local builds don't require it.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "20"

      # Install JS deps for the two packages the desktop build needs: apps/web (the
      # embedded UI, built by the tauri.conf beforeBuildCommand → api:build:embedded
      # → web:build) and apps/desktop (the @tauri-apps/cli that `tauri build` runs).
      # The repo root has no JS deps — it only orchestrates.
      - name: Install web + desktop JS deps
        run: |
          npm ci --prefix apps/web
          npm ci --prefix apps/desktop

      # `tauri build` runs the beforeBuildCommand (sidecar + web/api + the nested
      # binary pre-signing from #715) and, because the APPLE_* env is set, signs +
      # notarizes + staples the .app. This is the heavy MLX-from-source build; the
      # nax runner keeps it warm. `--config updater.release.conf.json` additionally
      # emits the `.app.tar.gz` updater payload + `.sig` for the in-app updater
      # (sc-1355). It's enabled HERE only (a release-only config overlay) — kept out
      # of the committed tauri.conf.json so non-release builds don't require the
      # signing key. Passed as a file, not inline JSON, so the same invocation is
      # quoting-safe under PowerShell on the Windows runner too.
      - name: Build, sign & notarize the desktop bundle
        run: npm --prefix apps/desktop run build -- --config updater.release.conf.json

      # Tauri staples the .app but not the wrapping .dmg — staple the DMG so the
      # downloaded artifact verifies offline (shared script; same as `release:mac`).
      - name: Staple the DMG
        run: node apps/desktop/scripts/staple-dmg.mjs

      # Create a DRAFT release with the already-stapled DMG attached (review before
      # publishing). The body is a fixed install blurb followed by auto-generated
      # notes (--generate-notes appends a changelog of merged PRs since the last
      # release). Tags with a pre-release suffix (e.g. v1.2.3-rc.1) are marked
      # prerelease. The tag name goes through an env var, not inline `${{ }}`, to
      # avoid script-injection from the ref.
      - name: Draft GitHub Release with the stapled DMG + updater payload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "No DMG produced under target/release/bundle/dmg/" >&2
            exit 1
          fi
          # The auto-updater payload (createUpdaterArtifacts): the .app.tar.gz the
          # app downloads + the .sig whose contents go into latest.json (sc-1355).
          tarballs=(target/release/bundle/macos/*.app.tar.gz)
          sigs=(target/release/bundle/macos/*.app.tar.gz.sig)
          if [ ${#tarballs[@]} -eq 0 ] || [ ${#sigs[@]} -eq 0 ]; then
            echo "No macOS updater artifacts under target/release/bundle/macos/ (*.app.tar.gz[.sig])" >&2
            exit 1
          fi
          notes=$(printf '%s\n' \
            '## macOS (Apple Silicon, macOS 26.2+)' \
            'Signed & notarized build. Open the DMG and drag SceneWorks to Applications.' \
            '' \
            '## Windows (CUDA GPU)' \
            'Run the .msi installer. Requires an NVIDIA GPU; the CUDA/cuDNN runtime is downloaded on first launch.')
          args=(--draft --generate-notes --title "SceneWorks $TAG" --notes "$notes")
          case "$TAG" in *-*) args+=(--prerelease) ;; esac
          # Attach the DMG (fresh install) + the updater tarball (in-app update payload).
          gh release create "$TAG" "${args[@]}" "${dmgs[0]}" "${tarballs[0]}"

          # Seed latest.json with the darwin-aarch64 entry. The URL is the canonical
          # tag asset URL (valid once the draft is published); the signature is the
          # .sig contents. The Windows job merges its entry in afterward.
          tarball_name="$(basename "${tarballs[0]}")"
          node apps/desktop/scripts/build-update-manifest.mjs \
            --target darwin-aarch64 \
            --version "${TAG#v}" \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${tarball_name}" \
            --sig "${sigs[0]}" \
            --notes "SceneWorks $TAG" \
            --out latest.json
          gh release upload "$TAG" --clobber latest.json

  windows:
    # Attach the Windows installers to the draft release the macos job created.
    # needs: macos so the release exists before we upload (upload --clobber is
    # idempotent on re-runs). Build steps mirror desktop-windows.yml's
    # build-windows job — keep them in sync. This is the heavy candle CUDA release
    # build (the SHIPPED artifacts), so it needs the CUDA Toolkit + MSVC toolset.
    needs: macos
    if: ${{ github.repository == 'SceneWorks/SceneWorks' }}
    runs-on: windows-2022
    env:
      # compute_80 PTX the driver JITs forward to sm_120 — one binary covers
      # Ampere->Blackwell (sc-3676); build-sidecar.mjs defaults this too.
      CUDA_COMPUTE_CAP: "80"
      # Same minisign keypair as the macos job — signs the NSIS updater payload so
      # the shipped app verifies it against plugins.updater.pubkey (sc-1355).
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
      # Put the VS2022 MSVC toolchain (cl.exe) on PATH so nvcc finds the host
      # compiler when candle-kernels' build script compiles the CUDA kernels.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      # Install the CUDA 12.9 Toolkit (nvcc + cudart/cublas/curand/nvrtc dev libs)
      # the candle `cuda` feature links against. Sets CUDA_PATH for the build +
      # the redist staging in build-sidecar.mjs. (Pin kept in lockstep with
      # desktop-windows.yml / server-candle-linux.yml.)
      - name: Install CUDA Toolkit 12.9
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76 # v0.2.35
        with:
          cuda: "12.9.1"
          method: "network"
      # The candle-gen single-rev invariant the default skew gate is blind to: with
      # `--features backend-candle` a candle-gen pin resolving a different gen-core
      # rev would split the inventory registry => runtime "engine not found"
      # (sc-4482). Guard before the expensive build.
      - name: Guard against gen-core version skew (candle)
        shell: bash
        run: |
          bash scripts/check-gen-core-skew.sh --self-test
          bash scripts/check-gen-core-skew.sh sceneworks-worker --features backend-candle
          bash scripts/check-gen-core-skew.sh sceneworks-rust-api --features embed-web,backend-candle
      - name: Install web dependencies
        run: npm ci --prefix apps/web
      - name: Install desktop dependencies
        run: npm ci --prefix apps/desktop
      # `tauri build` runs build-sidecar.mjs, which on Windows builds the candle
      # sidecar by default (nvcc compiles every provider's CUDA kernels) and stages
      # the ffmpeg resource, then packages both installers. The ~2.7 GB CUDA/cuDNN/
      # onnxruntime runtime is downloaded on first run (cuda_provision.rs), so the
      # installers stay small. `--config updater.release.conf.json` also signs the
      # NSIS `-setup.exe` updater payload (+ `.sig`) for the in-app updater (sc-1355).
      # Passed as a file (not inline JSON) so it survives PowerShell quoting here.
      - name: Build Windows candle installers (NSIS + MSI)
        run: npm --prefix apps/desktop run build -- --bundles nsis,msi --config updater.release.conf.json
      # Upload to the draft release the macos job created. The user ships the MSI
      # (per desktop-windows.yml); the NSIS .exe is attached too as an alternative.
      # --clobber so re-running the job replaces rather than 409s. Then merge the
      # windows-x86_64 entry into the latest.json the macos job seeded (sc-1355): the
      # NSIS `-setup.exe` is the updater payload; its `.sig` contents go in the
      # manifest. The artifact the `.sig` signs is derived from the .sig path, so this
      # stays correct whether Tauri emits a `-setup.exe` or a `.nsis.zip`.
      - name: Attach Windows installers + merge updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          installers=(target/release/bundle/msi/*.msi target/release/bundle/nsis/*.exe)
          if [ ${#installers[@]} -eq 0 ]; then
            echo "No installers produced under target/release/bundle/{msi,nsis}/" >&2
            exit 1
          fi
          sigs=(target/release/bundle/nsis/*.sig)
          if [ ${#sigs[@]} -eq 0 ]; then
            echo "No NSIS updater signature under target/release/bundle/nsis/*.sig" >&2
            exit 1
          fi
          sig="${sigs[0]}"
          payload="${sig%.sig}"          # the artifact the .sig signs (the update payload)
          payload_name="$(basename "$payload")"

          # Upload the installers, then the updater payload — but only if it isn't
          # already one of the installers. The NSIS payload IS the `-setup.exe`
          # that `nsis/*.exe` already globbed, so listing it twice in one
          # `gh release upload` makes the second create the same asset name and 404s.
          # The guard still covers a hypothetical `.nsis.zip` payload (not in the glob).
          gh release upload "$TAG" --clobber "${installers[@]}"
          case " ${installers[*]} " in
            *" $payload "*) : ;;  # already uploaded above
            *) gh release upload "$TAG" --clobber "$payload" ;;
          esac

          # Merge the windows-x86_64 entry into the macos-seeded manifest.
          gh release download "$TAG" -p latest.json --clobber
          node apps/desktop/scripts/build-update-manifest.mjs \
            --target windows-x86_64 \
            --version "${TAG#v}" \
            --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${payload_name}" \
            --sig "$sig" \
            --in latest.json \
            --out latest.json
          gh release upload "$TAG" --clobber latest.json
